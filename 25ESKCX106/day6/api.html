<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Records</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body class="bg-light">

    <div class="container py-5">
        <h2 class="text-center mb-4">User Records</h2>

        <input type="text" id="search" class="form-control mb-4" placeholder="Search User">

        <div id="container" class="row g-4"></div>
    </div>

    <script>
        fetch('https://jsonplaceholder.typicode.com/users')
        .then(response => response.json())
        .then(data => {

            let html = "";

            data.forEach(user => {
                html += `
                <div class="col-md-4 card-item">
                    <div class="card shadow h-100">
                        <div class="card-body text-center">
                            <img src="https://i.pravatar.cc/150?img=${user.id}"
                        class="square mb-3"
                        alt="User Avatar"
                          width="120"
                           height="120">

                            <h4>${user.name}</h4>

                            <button class="btn btn-primary btn-sm mt-2">
                                Show Details
                            </button>

                            <div class="details mt-3" style="display:none;">
                                <p><strong>Username:</strong> ${user.username}</p>
                                <p><strong>Email:</strong> ${user.email}</p>
                                <p><strong>Street:</strong> ${user.address.street}</p>
                                <p><strong>Phone:</strong> ${user.phone}</p>
                                <p><strong>Suite:</strong> ${user.address.suite}</p>
                                <p><strong>City:</strong> ${user.address.city}</p>
                                <p><strong>Zipcode:</strong> ${user.address.zipcode}</p>
                                <p><strong>Website:</strong> ${user.website}</p>
                                <p><strong>lat:</strong> ${user.address.geo.lat}</p>
                                <p><strong>lng:</strong> ${user.address.geo.lng}</p>
                                <p><strong>Catch Phrase:</strong> ${user.company.catchPhrase}</p>
                                <p><strong>BS:</strong> ${user.company.bs}</p>
                                <p><strong>Company:</strong> ${user.company.name}</p>
                            </div>
                        </div>
                    </div>
                </div>
                `;
            });

            document.getElementById("container").innerHTML = html;
        });

        // Show / Hide Details
        $(document).on("click", ".btn", function () {
            $(this).next(".details").slideToggle();
        });

        // Search User
        $("#search").keyup(function () {
            let value = $(this).val().toLowerCase();

            $(".card-item").each(function () {
                let name = $(this).find("h4").text().toLowerCase();

                if (name.includes(value)) {
                    $(this).show();
                } else {
                    $(this).hide();
                }
            });
        });
    </script>

</body>
</html>
